services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: stylai-db
    environment:
      POSTGRES_DB: stylai
      POSTGRES_USER: stylai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stylai_dev_password}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stylai"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: stylai-api
    ports:
      - "8000:8000"
    env_file:
      - ../apps/api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://stylai:stylai_dev_password@postgres:5432/stylai
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    environment:
      INTERNAL_API_URL: http://api:8000/api/v1
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    container_name: stylai-web
    ports:
      - "3000:3000"
    
    depends_on:
      - api

volumes:
  pgdata:
