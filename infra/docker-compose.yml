services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: stylai-db
    environment:
      POSTGRES_DB: stylai
      POSTGRES_USER: stylai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stylai_dev_password}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stylai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
